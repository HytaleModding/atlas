name: build-app

# Builds the Atlas desktop installers on every push to `main` and on
# every pull request that touches the app, and uploads the bundles as
# GitHub Actions *artifacts* (NOT a Release).
#
# Why this exists, separately from `release-app.yml`:
#   - `release-app.yml` triggers on `v*` tags. That means the only way
#     to get a real installer to smoke-test was to tag, push, and hope.
#     Catching a regression after the tag was already public meant
#     yanking the release and re-tagging.
#   - This workflow runs on every push, so the smoke-test loop is
#     "merge to main → download artifact from the run → install →
#     work through SMOKE_TESTS.md → tag only if it passes". No public
#     Release is created until the bundles have actually been driven.
#
# Artifacts attached to each run:
#   - Windows:  Atlas_<version>_x64-setup.exe + Atlas_<version>_x64_en-US.msi
#   - macOS:    Atlas_<version>_aarch64.dmg   + Atlas.app.tar.gz
#   - Linux:    atlas_<version>_amd64.AppImage + atlas_<version>_amd64.deb
#
# Artifacts are kept for 14 days (default Actions retention overrides
# below). Long enough to grab last week's build for a comparison test,
# short enough not to balloon storage.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/build-app.yml"

permissions:
  contents: read

concurrency:
  # One smoke-test build per ref at a time. New pushes cancel in-flight
  # builds for the same ref - if you push a fix, you don't care about
  # the older build's bundles.
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (windows)
    # Windows-only smoke build on every push. Most Atlas users are on
    # Windows and most regressions surface there first, so building
    # only Windows on the iteration loop cuts runner-minutes by ~67%
    # without losing meaningful coverage. macOS and Linux installers
    # are still produced by `release-app.yml` on tag, so a green tag
    # still ships all three platforms.
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # `shared-key` shares the cache across runs / workflows. `prefix-key`
      # is a manual reset lever - bump it to force-invalidate everything
      # when the dep tree shifts in a way that can't be incrementally
      # recompiled. `cache-on-failure` keeps the cache populated even
      # when the build itself fails (so the next attempt isn't cold).
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: atlas-x86_64-pc-windows-msvc
          prefix-key: v1-cargo
          cache-on-failure: true

      # sccache caches the compile output of *our* crates (atlas_lib +
      # atlas), not just deps. Swatinem/rust-cache above already caches
      # third-party deps as a target/-shaped blob; sccache fills the gap
      # for the workspace itself, which is the bulk of the cargo build
      # time (~11 of the ~19 min on warm builds). Backed by GHA cache so
      # no external service required.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri bundle
        # CARGO_PROFILE_RELEASE_* env overrides switch the iteration-loop
        # MSI to a faster-compiling release profile (LTO off, more
        # codegen-units). Tagged ships go through release-app.yml which
        # does NOT set these, so public installers still get the slow
        # fully-optimized profile. Worst-case runtime cost on the smoke
        # MSI is a few % - not noticeable when the goal is "click around
        # and see if anything breaks".
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Print sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Upload installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
